<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>AmyNest AI — Where Smart Parenting Begins</title>
    <meta name="description" content="AI-powered parenting coach. Personalized routines, meal plans, and behavior coaching for your child." />

    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json" />

    <!-- Theme color (Android Chrome toolbar + PWA title bar) -->
    <meta name="theme-color" content="#A855F7" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AmyNest AI" />
    <link rel="apple-touch-icon" href="pwa-icon-512.png" />

    <!-- iOS splash screens (dark purple background matching mobile app) -->
    <meta name="apple-mobile-web-app-splash-screen" content="#0f0c29" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="amynest-logo.png" />
    <link rel="shortcut icon" type="image/svg+xml" href="favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:title" content="AmyNest AI — Where Smart Parenting Begins" />
    <meta property="og:description" content="Step-by-step, science-backed parenting plans personalized for your child." />
    <meta property="og:image" content="opengraph.jpg" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Quicksand:wght@500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
      html, body {
        background-color: #0E0830;
        margin: 0;
        padding: 0;
      }

      /* ── Splash — "Meet AMY" premium edition ───────────────────────── */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        /* Deep purple → dark blue */
        background:
          radial-gradient(ellipse at 30% 20%, rgba(123,63,242,0.32) 0%, transparent 55%),
          radial-gradient(ellipse at 75% 85%, rgba(74,139,255,0.28) 0%, transparent 55%),
          linear-gradient(165deg, #1B0A3E 0%, #14083A 35%, #0A1240 70%, #07173E 100%);
        overflow: hidden;
        transition: opacity 0.7s ease, visibility 0.7s ease;
      }
      #splash.splash-hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Cinematic vignette */
      #splash::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%);
        pointer-events: none;
      }

      /* ── Floating particles ─────────────────────────────────────────── */
      .splash-particles {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .splash-particles span {
        position: absolute;
        bottom: -12px;
        left: var(--x, 50%);
        width: var(--s, 2px);
        height: var(--s, 2px);
        border-radius: 50%;
        background: rgba(255,255,255,0.85);
        box-shadow: 0 0 6px rgba(180,140,255,0.65);
        opacity: 0;
        animation: particleRise var(--dur, 16s) var(--d, 0s) linear infinite;
        will-change: transform, opacity;
      }
      @keyframes particleRise {
        0%   { transform: translate(0, 0); opacity: 0; }
        8%   { opacity: 0.85; }
        92%  { opacity: 0.55; }
        100% { transform: translate(var(--drift, 20px), -108vh); opacity: 0; }
      }

      /* ── Stage ──────────────────────────────────────────────────────── */
      .splash-stage {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 0 24px;
      }

      /* ── Glowing rotating + pulsing gradient ring ───────────────────── */
      .splash-ring-wrap {
        width: 140px;
        height: 140px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 38px;
        animation: ringPulse 2.6s ease-in-out infinite;
      }
      .splash-ring {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: conic-gradient(
          from 0deg,
          #7B3FF2 0deg,
          #B85FFF 90deg,
          #4A8BFF 180deg,
          #6B4DFF 270deg,
          #7B3FF2 360deg
        );
        -webkit-mask: radial-gradient(circle, transparent 56px, black 60px);
                mask: radial-gradient(circle, transparent 56px, black 60px);
        box-shadow:
          0 0 30px rgba(123,63,242,0.55),
          0 0 70px rgba(74,139,255,0.35),
          0 0 120px rgba(123,63,242,0.18);
        filter: drop-shadow(0 0 8px rgba(184,95,255,0.45));
        animation: ringRotate 8s linear infinite;
        will-change: transform;
      }
      @keyframes ringRotate {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes ringPulse {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.05); }
      }

      /* ── Title: "Meet AMY" ──────────────────────────────────────────── */
      .splash-title {
        font-family: 'Quicksand', 'Nunito', system-ui, sans-serif;
        font-size: 44px;
        font-weight: 600;
        letter-spacing: 2px;
        color: #FFFFFF;
        margin: 0;
        text-shadow:
          0 0 14px rgba(184,140,255,0.55),
          0 0 32px rgba(123,63,242,0.45),
          0 1px 2px rgba(0,0,0,0.4);
        opacity: 0;
        animation: titleFadeIn 0.9s 0.8s cubic-bezier(0.22,1,0.36,1) forwards;
      }
      @keyframes titleFadeIn {
        from { opacity: 0; transform: translateY(12px); letter-spacing: 6px; }
        to   { opacity: 1; transform: translateY(0);    letter-spacing: 2px; }
      }

      /* ── Subtext ─────────────────────────────────────────────────────── */
      .splash-sub {
        font-family: 'Quicksand', 'Nunito', system-ui, sans-serif;
        color: rgba(225,215,255,0.78);
        margin: 0;
        opacity: 0;
      }
      .splash-sub-1 {
        font-size: 15px;
        font-weight: 500;
        margin-top: 18px;
        letter-spacing: 0.4px;
        animation: subFadeIn 0.9s 1.5s cubic-bezier(0.22,1,0.36,1) forwards;
      }
      .splash-sub-2 {
        font-size: 12px;
        font-weight: 400;
        margin-top: 10px;
        letter-spacing: 1.4px;
        text-transform: uppercase;
        color: rgba(180,165,225,0.55);
        animation: subFadeIn 0.9s 1.9s cubic-bezier(0.22,1,0.36,1) forwards;
      }
      @keyframes subFadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── Mobile responsive tweaks ──────────────────────────────────── */
      @media (max-width: 480px) {
        .splash-ring-wrap { width: 110px; height: 110px; margin-bottom: 32px; }
        .splash-ring {
          -webkit-mask: radial-gradient(circle, transparent 44px, black 47px);
                  mask: radial-gradient(circle, transparent 44px, black 47px);
        }
        .splash-title { font-size: 34px; letter-spacing: 1.5px; }
        .splash-sub-1 { font-size: 14px; }
        .splash-sub-2 { font-size: 11px; letter-spacing: 1.2px; }
      }
    </style>
  </head>
  <body>
    <!-- ── Splash (shown immediately, dismissed after React mounts) ── -->
    <div id="splash" role="status" aria-label="Loading AmyNest AI…">
      <div class="splash-particles" aria-hidden="true">
        <span style="--x:6%;--s:2px;--d:0s;--dur:14s;--drift:30px"></span>
        <span style="--x:14%;--s:1px;--d:2s;--dur:18s;--drift:-20px"></span>
        <span style="--x:22%;--s:3px;--d:4s;--dur:16s;--drift:25px"></span>
        <span style="--x:30%;--s:2px;--d:1s;--dur:20s;--drift:-15px"></span>
        <span style="--x:38%;--s:1px;--d:5s;--dur:22s;--drift:35px"></span>
        <span style="--x:46%;--s:2px;--d:3s;--dur:15s;--drift:-30px"></span>
        <span style="--x:54%;--s:3px;--d:6s;--dur:19s;--drift:20px"></span>
        <span style="--x:62%;--s:1px;--d:0s;--dur:17s;--drift:-25px"></span>
        <span style="--x:70%;--s:2px;--d:4s;--dur:21s;--drift:30px"></span>
        <span style="--x:78%;--s:2px;--d:2s;--dur:14s;--drift:-20px"></span>
        <span style="--x:86%;--s:1px;--d:7s;--dur:18s;--drift:15px"></span>
        <span style="--x:94%;--s:2px;--d:3s;--dur:16s;--drift:-30px"></span>
      </div>

      <div class="splash-stage">
        <div class="splash-ring-wrap" aria-hidden="true">
          <div class="splash-ring"></div>
        </div>
        <h1 class="splash-title">Meet AMY</h1>
        <p class="splash-sub splash-sub-1">Your child&rsquo;s smart learning companion</p>
        <p class="splash-sub splash-sub-2">Built for growth. Designed for curiosity.</p>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx?v=20260426-fix"></script>
  </body>
</html>
