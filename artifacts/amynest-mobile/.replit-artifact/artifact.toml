kind = "mobile"
previewPath = "/amynest-mobile/"
title = "AmyNest AI — Mobile App"
version = "1.0.0"
id = "artifacts/amynest-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/amynest-mobile/" ]
localPort = 21342

[services.development]
run = "pnpm --filter @workspace/amynest-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/amynest-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/amynest-mobile", "run", "serve" ]

[services.env]
PORT = "21342"
BASE_PATH = "/amynest-mobile/"
