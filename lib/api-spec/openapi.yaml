openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: children
    description: Child profile operations
  - name: routines
    description: Daily routine operations
  - name: behaviors
    description: Behavior tracking operations
  - name: dashboard
    description: Dashboard and summary operations
  - name: ai
    description: AI routine generation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /children:
    get:
      operationId: listChildren
      tags: [children]
      summary: List all children profiles
      responses:
        "200":
          description: List of children
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Child"
    post:
      operationId: createChild
      tags: [children]
      summary: Create a child profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChildBody"
      responses:
        "201":
          description: Created child
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Child"

  /children/{id}:
    get:
      operationId: getChild
      tags: [children]
      summary: Get a child profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Child profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Child"
        "404":
          description: Not found
    patch:
      operationId: updateChild
      tags: [children]
      summary: Update a child profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChildBody"
      responses:
        "200":
          description: Updated child
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Child"
        "404":
          description: Not found
    delete:
      operationId: deleteChild
      tags: [children]
      summary: Delete a child profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /routines:
    get:
      operationId: listRoutines
      tags: [routines]
      summary: List routines
      parameters:
        - name: childId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of routines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Routine"
    post:
      operationId: createRoutine
      tags: [routines]
      summary: Create a routine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoutineBody"
      responses:
        "201":
          description: Created routine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Routine"

  /routines/{id}:
    get:
      operationId: getRoutine
      tags: [routines]
      summary: Get a routine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Routine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Routine"
        "404":
          description: Not found
    delete:
      operationId: deleteRoutine
      tags: [routines]
      summary: Delete a routine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /routines/generate:
    post:
      operationId: generateRoutine
      tags: [ai]
      summary: Generate a daily routine with AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRoutineBody"
      responses:
        "200":
          description: Generated routine with schedule items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedRoutine"

  /behaviors:
    get:
      operationId: listBehaviors
      tags: [behaviors]
      summary: List behavior logs
      parameters:
        - name: childId
          in: query
          required: false
          schema:
            type: integer
        - name: date
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of behavior logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BehaviorLog"
    post:
      operationId: createBehaviorLog
      tags: [behaviors]
      summary: Log a behavior
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBehaviorLogBody"
      responses:
        "201":
          description: Created behavior log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BehaviorLog"

  /behaviors/{id}:
    delete:
      operationId: deleteBehaviorLog
      tags: [behaviors]
      summary: Delete a behavior log
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-routines:
    get:
      operationId: getRecentRoutines
      tags: [dashboard]
      summary: Get recently generated routines
      responses:
        "200":
          description: Recent routines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Routine"

  /routines/check:
    get:
      operationId: checkRoutine
      tags: [routines]
      summary: Check if a routine exists for child + date
      parameters:
        - name: childId
          in: query
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Routine existence check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckRoutineResponse"

  /routines/{id}/items:
    patch:
      operationId: updateRoutineItems
      tags: [routines]
      summary: Update routine items (mark complete/skipped/delayed)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoutineItemsBody"
      responses:
        "200":
          description: Updated routine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Routine"

  /insights:
    post:
      operationId: generateInsights
      tags: [ai]
      summary: Generate weekly insights from routine completion data
      responses:
        "200":
          description: Generated insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateInsightsResponse"

  /babysitters:
    get:
      operationId: listBabysitters
      tags: [children]
      summary: List babysitters
      responses:
        "200":
          description: Babysitters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BabysitterSchema"
    post:
      operationId: createBabysitter
      tags: [children]
      summary: Add a babysitter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBabysitterBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BabysitterSchema"

  /babysitters/{id}:
    delete:
      operationId: deleteBabysitter
      tags: [children]
      summary: Delete a babysitter
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /parent-profile:
    get:
      operationId: getParentProfile
      tags: [children]
      summary: Get current user's parent profile
      responses:
        "200":
          description: Parent profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetParentProfileResponse"
        "404":
          description: Not found
    put:
      operationId: upsertParentProfile
      tags: [children]
      summary: Create or update parent profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertParentProfileBody"
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetParentProfileResponse"

  /ai/recipe:
    post:
      operationId: getRecipe
      tags: [ai]
      summary: Look up a rule-based recipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetRecipeBody"
      responses:
        "200":
          description: Recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRecipeResponse"

  /ai/assistant:
    post:
      operationId: askAssistant
      tags: [ai]
      summary: Ask the rule-based parenting assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AskAssistantBody"
      responses:
        "200":
          description: Answer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AskAssistantResponse"

  /dashboard/behavior-stats:
    get:
      operationId: getBehaviorStats
      tags: [dashboard]
      summary: Get behavior stats per child
      responses:
        "200":
          description: Behavior stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BehaviorStat"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Child:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        dob:
          type: string
          nullable: true
        age:
          type: integer
        ageMonths:
          type: integer
        isSchoolGoing:
          type: boolean
          nullable: true
        childClass:
          type: string
          nullable: true
        schoolStartTime:
          type: string
        schoolEndTime:
          type: string
        schoolDays:
          type: array
          nullable: true
          items:
            type: integer
            minimum: 1
            maximum: 7
        wakeUpTime:
          type: string
        sleepTime:
          type: string
        travelMode:
          type: string
        travelModeOther:
          type: string
          nullable: true
        foodType:
          type: string
        goals:
          type: string
        babysitterId:
          type: integer
          nullable: true
        photoUrl:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - name
        - age
        - ageMonths
        - schoolStartTime
        - schoolEndTime
        - wakeUpTime
        - sleepTime
        - travelMode
        - foodType
        - goals
        - createdAt

    CreateChildBody:
      type: object
      properties:
        name:
          type: string
        dob:
          type: string
          nullable: true
        age:
          type: integer
        ageMonths:
          type: integer
        isSchoolGoing:
          type: boolean
          nullable: true
        childClass:
          type: string
          nullable: true
        schoolStartTime:
          type: string
        schoolEndTime:
          type: string
        schoolDays:
          type: array
          nullable: true
          items:
            type: integer
            minimum: 1
            maximum: 7
        wakeUpTime:
          type: string
        sleepTime:
          type: string
        travelMode:
          type: string
        travelModeOther:
          type: string
          nullable: true
        foodType:
          type: string
        goals:
          type: string
        babysitterId:
          type: integer
          nullable: true
        photoUrl:
          type: string
          nullable: true
      required:
        - name
        - age
        - schoolStartTime
        - schoolEndTime
        - goals

    UpdateChildBody:
      type: object
      properties:
        name:
          type: string
        dob:
          type: string
          nullable: true
        age:
          type: integer
        ageMonths:
          type: integer
        isSchoolGoing:
          type: boolean
          nullable: true
        childClass:
          type: string
          nullable: true
        schoolStartTime:
          type: string
        schoolEndTime:
          type: string
        schoolDays:
          type: array
          nullable: true
          items:
            type: integer
            minimum: 1
            maximum: 7
        wakeUpTime:
          type: string
        sleepTime:
          type: string
        travelMode:
          type: string
        travelModeOther:
          type: string
          nullable: true
        foodType:
          type: string
        goals:
          type: string
        babysitterId:
          type: integer
          nullable: true
        photoUrl:
          type: string
          nullable: true

    RoutineItem:
      type: object
      properties:
        id:
          type: string
        time:
          type: string
        activity:
          type: string
        duration:
          type: integer
        category:
          type: string
        notes:
          type: string
        rewardPoints:
          type: integer
        status:
          type: string
          enum: [pending, completed, skipped, delayed]
        meal:
          type: string
          nullable: true
        recipe:
          type: object
          nullable: true
          properties:
            prepTime: { type: string }
            cookTime: { type: string }
            servings: { type: string }
            ingredients:
              type: array
              items: { type: string }
            steps:
              type: array
              items: { type: string }
            tip: { type: string, nullable: true }
        nutrition:
          type: object
          nullable: true
          properties:
            calories: { type: string }
            protein: { type: string }
            carbs: { type: string }
            fat: { type: string }
            notes: { type: string, nullable: true }
        ageBand:
          type: string
          nullable: true
          enum: ["2-5", "6-10", "10+"]
        parentHubTopic:
          type: string
          nullable: true
      required:
        - time
        - activity
        - duration
        - category

    Routine:
      type: object
      properties:
        id:
          type: integer
        childId:
          type: integer
        childName:
          type: string
        date:
          type: string
        title:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/RoutineItem"
        createdAt:
          type: string
      required:
        - id
        - childId
        - childName
        - date
        - title
        - items
        - createdAt

    CreateRoutineBody:
      type: object
      properties:
        childId:
          type: integer
        date:
          type: string
        title:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/RoutineItem"
        override:
          type: boolean
      required:
        - childId
        - date
        - title
        - items

    GenerateRoutineBody:
      type: object
      properties:
        childId:
          type: integer
        date:
          type: string
        hasSchool:
          type: boolean
        isWorkingDay:
          type: boolean
        specialPlans:
          type: string
          nullable: true
        fridgeItems:
          type: string
          nullable: true
        mood:
          type: string
          nullable: true
        parent1Role:
          type: string
          nullable: true
        parent1WorkType:
          type: string
          nullable: true
        parent1IsWorking:
          type: boolean
          nullable: true
        parent2Role:
          type: string
          nullable: true
        parent2WorkType:
          type: string
          nullable: true
        parent2IsWorking:
          type: boolean
          nullable: true
        region:
          type: string
          nullable: true
        wakeTime:
          type: string
          nullable: true
        age:
          type: integer
          nullable: true
        schoolStart:
          type: string
          nullable: true
        schoolEnd:
          type: string
          nullable: true
      required:
        - childId
        - date

    GeneratedRoutine:
      type: object
      properties:
        title:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/RoutineItem"
      required:
        - title
        - items

    CheckRoutineResponse:
      type: object
      properties:
        exists:
          type: boolean
        routineId:
          type: integer
      required:
        - exists

    UpdateRoutineItemsBody:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RoutineItem"
      required:
        - items

    InsightsItem:
      type: object
      properties:
        type:
          type: string
          enum: [positive, warning, suggestion]
        message:
          type: string
        icon:
          type: string
      required:
        - type
        - message
        - icon

    GenerateInsightsResponse:
      type: object
      properties:
        insights:
          type: array
          items:
            $ref: "#/components/schemas/InsightsItem"
        summary:
          type: string
      required:
        - insights
        - summary

    BabysitterSchema:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        name:
          type: string
        mobileNumber:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - userId
        - name
        - createdAt

    CreateBabysitterBody:
      type: object
      properties:
        name:
          type: string
        mobileNumber:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required:
        - name

    ParentProfileFreeSlot:
      type: object
      properties:
        day:
          type: string
        start:
          type: string
        end:
          type: string

    GetParentProfileResponse:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        name:
          type: string
          nullable: true
        role:
          type: string
        gender:
          type: string
          nullable: true
        mobileNumber:
          type: string
          nullable: true
        workType:
          type: string
        workStartTime:
          type: string
          nullable: true
        workEndTime:
          type: string
          nullable: true
        freeSlots:
          type: array
          items:
            $ref: "#/components/schemas/ParentProfileFreeSlot"
        foodType:
          type: string
        allergies:
          type: string
          nullable: true
        region:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - userId
        - role
        - workType
        - foodType
        - region
        - createdAt
        - updatedAt

    UpsertParentProfileBody:
      type: object
      properties:
        name:
          type: string
          nullable: true
        role:
          type: string
        gender:
          type: string
          nullable: true
        mobileNumber:
          type: string
          nullable: true
        workType:
          type: string
        workStartTime:
          type: string
          nullable: true
        workEndTime:
          type: string
          nullable: true
        freeSlots:
          type: array
          items:
            $ref: "#/components/schemas/ParentProfileFreeSlot"
        foodType:
          type: string
        allergies:
          type: string
          nullable: true
        region:
          type: string

    GetRecipeBody:
      type: object
      properties:
        mealName:
          type: string
        foodType:
          type: string
          nullable: true
      required:
        - mealName

    RecipeStep:
      type: object
      properties:
        step:
          type: integer
        instruction:
          type: string
      required:
        - step
        - instruction

    GetRecipeResponse:
      type: object
      properties:
        name:
          type: string
        prepTime:
          type: string
        cookTime:
          type: string
        servings:
          type: string
        ingredients:
          type: array
          items:
            type: string
        steps:
          type: array
          items:
            $ref: "#/components/schemas/RecipeStep"
        tips:
          type: string
      required:
        - name
        - prepTime
        - cookTime
        - servings
        - ingredients
        - steps

    AskAssistantBody:
      type: object
      properties:
        question:
          type: string
        childName:
          type: string
          nullable: true
        childAge:
          type: integer
          nullable: true
      required:
        - question

    AskAssistantResponse:
      type: object
      properties:
        answer:
          type: string
      required:
        - answer

    BehaviorLog:
      type: object
      properties:
        id:
          type: integer
        childId:
          type: integer
        childName:
          type: string
        date:
          type: string
        behavior:
          type: string
        type:
          type: string
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - childId
        - childName
        - date
        - behavior
        - type
        - createdAt

    CreateBehaviorLogBody:
      type: object
      properties:
        childId:
          type: integer
        date:
          type: string
        behavior:
          type: string
        type:
          type: string
        notes:
          type: ["string", "null"]
      required:
        - childId
        - date
        - behavior
        - type

    DashboardSummary:
      type: object
      properties:
        totalChildren:
          type: integer
        totalRoutines:
          type: integer
        positiveBehaviorsToday:
          type: integer
        negativeBehaviorsToday:
          type: integer
        routinesGeneratedThisWeek:
          type: integer
      required:
        - totalChildren
        - totalRoutines
        - positiveBehaviorsToday
        - negativeBehaviorsToday
        - routinesGeneratedThisWeek

    BehaviorStat:
      type: object
      properties:
        childId:
          type: integer
        childName:
          type: string
        positive:
          type: integer
        negative:
          type: integer
        neutral:
          type: integer
      required:
        - childId
        - childName
        - positive
        - negative
        - neutral
